<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="true" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#070816" />
  <title>Launcher VIBE</title>
  <style>
    :root {
      --bg: #070816;
      --panel: rgba(12, 15, 30, 0.82);
      --panel-2: rgba(16, 20, 38, 0.92);
      --line: rgba(255, 255, 255, 0.14);
      --text: rgba(255, 255, 255, 0.98);
      --text-muted: rgba(255, 255, 255, 0.72);
      --text-muted2: rgba(255, 255, 255, 0.48);
      --shadow: 0 28px 100px rgba(0, 0, 0, 0.34);
      --shadow-sm: 0 10px 28px rgba(0, 0, 0, 0.18);
      --radius: 34px;
      --radius-lg: 28px;
      --radius-md: 18px;
      --blur-lg: blur(16px);
      --blur-md: blur(10px);
      --transition: 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      --card-height: 88px;
      --max-content: 430px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 20%, rgba(99, 102, 241, 0.32), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(34, 211, 238, 0.22), transparent 24%),
        radial-gradient(circle at 50% 92%, rgba(236, 72, 153, 0.16), transparent 28%),
        var(--bg);
      background-attachment: fixed;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -webkit-touch-callout: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.22;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 54px 54px;
      z-index: 0;
    }

    button, input, textarea, select { font: inherit; }
    img { display: block; }

    .view {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .view.active {
      opacity: 1;
      pointer-events: auto;
    }

    .home, .library, .vibe-library, .runtime { overflow: hidden; }
    .home {
      align-items: flex-start;
      justify-content: flex-start;
      padding: 18px 16px 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .topbar {
      width: 100%;
      max-width: var(--max-content);
      margin: 0 auto 12px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
    }

    .profile-chip {
      border: 1px solid rgba(255,255,255,0.15);
      background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
      backdrop-filter: var(--blur-md);
      border-radius: 999px;
      padding: 8px 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      min-height: 40px;
    }

    .profile-chip img, .profile-chip .profile-chip-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
      background: rgba(255,255,255,0.12);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex: 0 0 auto;
    }

    .profile-chip span { font-size: 12px; font-weight: 650; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .settings-btn {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(126, 34, 206, 0.45);
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(126, 34, 206, 0.3), rgba(88, 44, 131, 0.22));
      color: var(--text);
      backdrop-filter: var(--blur-md);
      font-size: 20px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
      box-shadow: 0 8px 24px rgba(126, 34, 206, 0.2);
    }
    .settings-btn:hover { transform: scale(1.06) rotate(14deg); }

    .home-content {
      width: 100%;
      max-width: var(--max-content);
      margin: 0 auto;
      text-align: center;
      animation: slideUp 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-large { margin: 8px 0 28px; }
    .brand-large small {
      display: block;
      font-size: 11px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--text-muted2);
      margin-bottom: 10px;
    }
    .brand-large h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1.05;
      font-weight: 950;
      background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(200,200,255,0.78));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-desc {
      margin: 0 0 24px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-muted);
    }

    .cta-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      margin-bottom: 18px;
    }

    .library-btn {
      position: relative;
      width: 100%;
      max-width: 310px;
      aspect-ratio: 1.55;
      border: none;
      border-radius: var(--radius-lg);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text);
      transition: transform var(--transition), box-shadow var(--transition);
      overflow: hidden;
      touch-action: manipulation;
      margin: 0 auto;
      padding: 16px;
    }

    .library-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(88,44,131,0.15), rgba(108,40,168,0.4), rgba(126,34,206,0.4), rgba(108,40,168,0.4), rgba(88,44,131,0.15));
      background-size: 200% 100%;
      animation: wavyGradient 3s ease-in-out infinite;
      z-index: 0;
      pointer-events: none;
    }
    @keyframes wavyGradient { 0% { background-position: 0% 0%; } 50% { background-position: 100% 0%; } 100% { background-position: 0% 0%; } }

    .library-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(88,44,131,0.42), rgba(108,40,168,0.28), rgba(126,34,206,0.18));
      border: 1px solid rgba(126,34,206,0.5);
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 60px rgba(88,44,131,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
      z-index: 1;
      pointer-events: none;
      backdrop-filter: var(--blur-md);
    }

    .library-btn span { position: relative; z-index: 2; }
    .library-btn:hover { transform: translateY(-4px); box-shadow: 0 28px 80px rgba(88,44,131,0.35); }
    .library-btn:active { transform: translateY(-1px) scale(0.98); }
    .library-btn-icon { font-size: 48px; line-height: 1; }
    .library-btn-text { font-size: 16px; font-weight: 760; }
    .library-btn-sub { font-size: 12px; color: var(--text-muted); font-weight: 500; }

    .vibe-mini-btn {
      position: relative;
      width: fit-content;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: linear-gradient(135deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05));
      backdrop-filter: var(--blur-md);
      box-shadow: var(--shadow-sm);
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: transform var(--transition), background var(--transition), border-color var(--transition);
    }
    .vibe-mini-btn:hover { transform: translateY(-2px); border-color: rgba(126,34,206,0.38); }

    .home-shortcuts {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      text-align: left;
    }
    .shortcut-column {
      padding: 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(145deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
      backdrop-filter: var(--blur-md);
      box-shadow: var(--shadow-sm);
    }
    .shortcut-title {
      margin: 0 0 8px;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      font-weight: 700;
    }
    .shortcut-list { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .quick-app-btn {
      border: 1px solid rgba(255,255,255,0.16);
      color: var(--text);
      border-radius: 16px;
      padding: 10px;
      cursor: pointer;
      display: flex;
      gap: 10px;
      transition: transform var(--transition), border-color var(--transition), background var(--transition);
      touch-action: manipulation;
    }
    .quick-app-btn.recent { background: linear-gradient(135deg, rgba(236,72,153,0.35), rgba(244,114,182,0.25)); border-color: rgba(236,72,153,0.5); }
    .quick-app-btn.favorite { background: linear-gradient(135deg, rgba(34,211,238,0.35), rgba(56,189,248,0.25)); border-color: rgba(34,211,238,0.5); }
    .quick-app-btn:hover { transform: translateY(-2px); }
    .quick-app-icon {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      overflow: hidden;
    }
    .quick-app-icon img { width: 100%; height: 100%; object-fit: cover; }
    .quick-app-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .quick-app-name {
      font-size: 13px;
      font-weight: 650;
      word-break: break-word;
      line-height: 1.2;
    }
    .quick-app-desc {
      font-size: 11px;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.2;
    }
    .shortcut-empty { margin: 12px 0 0; font-size: 12px; color: var(--text-muted2); text-align: center; }

    .library-header, .vibe-header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 16px 16px 12px;
      background:
        radial-gradient(circle at 18% 20%, rgba(99,102,241,0.32), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(34,211,238,0.22), transparent 24%),
        radial-gradient(circle at 50% 92%, rgba(236,72,153,0.17), transparent 28%),
        var(--bg);
      background-attachment: fixed;
    }
    .library-header::after, .vibe-header::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line) 20%, var(--line) 80%, transparent);
    }
    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
    }
    .lib-back-btn, .lib-add-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      margin: -8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .lib-add-btn { font-size: 24px; }
    .title-row h2 {
      margin: 0;
      flex: 1;
      font-size: 22px;
      font-weight: 900;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .lib-search {
      position: relative;
      width: 100%;
      max-width: var(--max-content);
      margin: 0 auto;
    }
    .lib-search input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font-size: 14px;
      backdrop-filter: var(--blur-md);
    }
    .lib-search input::placeholder { color: var(--text-muted2); }
    .lib-search input:focus { outline: none; border-color: rgba(255,255,255,0.28); background: rgba(255,255,255,0.12); }

    .content-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 16px 16px;
    }
    .apps-grid {
      width: 100%;
      max-width: var(--max-content);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-content: start;
      padding-bottom: 24px;
    }
    .app-card {
      position: relative;
      min-height: var(--card-height);
      border-radius: 20px;
      padding: 14px;
      border: 1px solid rgba(126, 34, 206, 0.36);
      background: linear-gradient(135deg, rgba(126, 34, 206, 0.24), rgba(108, 40, 168, 0.18), rgba(88, 44, 131, 0.12));
      backdrop-filter: var(--blur-md);
      box-shadow: 0 20px 50px rgba(126, 34, 206, 0.15), inset 0 1px 0 rgba(255,255,255,0.12);
      cursor: grab;
      display: flex;
      gap: 14px;
      align-items: center;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      touch-action: manipulation;
      overflow: hidden;
      user-select: none;
    }
    .app-card:hover { transform: translateY(-2px); border-color: rgba(168,85,247,0.6); box-shadow: 0 28px 70px rgba(168,85,247,0.22), inset 0 1px 0 rgba(255,255,255,0.18); }
    .app-card.dragging { opacity: 0.5; transform: scale(0.96); border-color: rgba(168,85,247,0.8); }
    .app-card.drag-over { border-style: dashed; border-color: rgba(168,85,247,0.9); }
    .app-card-menu {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity var(--transition);
      z-index: 5;
    }
    .app-card:hover .app-card-menu { opacity: 1; }
    .app-card-btn {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      width: 28px;
      height: 28px;
      padding: 4px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .app-card-btn svg { width: 14px; height: 14px; }
    .app-card-btn:hover { background: rgba(255,255,255,0.18); color: var(--text); }
    .app-card-btn.delete:hover { background: rgba(239,68,68,0.3); border-color: rgba(239,68,68,0.5); color: rgba(239,68,68,1); }
    .app-card-btn.favorite.active { background: rgba(251,146,60,0.3); border-color: rgba(251,146,60,0.5); color: rgba(251,146,60,1); }
    .app-card-icon {
      width: 60px;
      height: 60px;
      min-width: 60px;
      border-radius: 14px;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .app-card-icon img { width: 100%; height: 100%; object-fit: cover; }
    .app-card-content { min-width: 0; display: flex; flex-direction: column; gap: 3px; flex: 1; }
    .app-card-name { font-size: 15px; font-weight: 700; word-break: break-word; line-height: 1.25; }
    .app-card-desc { font-size: 13px; color: var(--text-muted); word-break: break-word; line-height: 1.25; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    .app-card-date { font-size: 12px; color: var(--text-muted2); line-height: 1.2; }
    .empty-state { padding: 44px 20px; text-align: center; }
    .empty-badge { font-size: 48px; margin-bottom: 16px; display: block; }
    .empty-state h4 { margin: 0 0 8px; font-size: 18px; font-weight: 700; color: var(--text); }
    .empty-state p { margin: 0; font-size: 14px; color: var(--text-muted); }

    .runtime-header {
      position: relative;
      padding: 12px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    .runtime-title { margin: 0; flex: 1; font-size: 16px; font-weight: 700; text-align: center; }
    .runtime-close {
      background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 8px; margin: -8px;
      display: flex; align-items: center; justify-content: center;
    }
    .runtime-content { flex: 1; overflow: hidden; background: #0b0d19; }
    .runtime-iframe { border: none; width: 100%; height: 100%; background: white; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: flex-end;
      background: rgba(0, 0, 0, 0);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      padding: 16px;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: auto; background: rgba(0,0,0,0.48); }
    .modal-panel {
      position: relative;
      background:
        radial-gradient(circle at 18% 20%, rgba(99,102,241,0.32), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(34,211,238,0.22), transparent 24%),
        var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: var(--blur-lg);
      width: 100%;
      max-width: 520px;
      max-height: 86vh;
      display: flex;
      flex-direction: column;
      margin: 0 auto;
      animation: slideUp 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .modal-header h3 { margin: 0; font-size: 20px; font-weight: 820; flex: 1; }
    .modal-close { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 8px; margin: -8px; display: flex; align-items: center; justify-content: center; }
    .modal-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .modal-footer { padding: 16px 20px 20px; border-top: 1px solid var(--line); display: flex; gap: 10px; justify-content: flex-end; }
    .btn {
      padding: 11px 18px; border: none; border-radius: var(--radius-md); font-size: 14px; font-weight: 650; cursor: pointer;
      transition: all var(--transition); touch-action: manipulation; white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, rgba(168,85,247,0.82), rgba(139,92,246,0.72));
      color: var(--text); border: 1px solid rgba(168,85,247,0.6);
      box-shadow: 0 12px 32px rgba(168,85,247,0.2); flex: 1;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 16px 48px rgba(168,85,247,0.3); }
    .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); border: 1px solid rgba(255,255,255,0.16); }
    .btn-secondary:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.24); }
    .btn-danger { border: 1px solid rgba(239,68,68,0.4); background: rgba(239,68,68,0.12); color: rgba(255,150,150,1); }
    .btn-danger:hover { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.6); }
    .btn-inline { background: none; border: none; color: var(--text-muted); text-decoration: underline; padding: 0; font-size: 12px; cursor: pointer; }
    .btn-inline:hover { color: var(--text); }

    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label { font-size: 13px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.02em; }
    .form-input {
      padding: 12px 14px; border: 1px solid var(--line); border-radius: var(--radius-md); background: rgba(255,255,255,0.08);
      color: var(--text); font-size: 14px; transition: border-color var(--transition), background var(--transition);
    }
    .form-input::placeholder { color: var(--text-muted2); }
    .form-input:focus { outline: none; border-color: rgba(168,85,247,0.6); background: rgba(255,255,255,0.12); }
    textarea.form-input { resize: vertical; min-height: 84px; font-family: inherit; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .settings-section, .account-card, .sync-card, .auth-card {
      padding: 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      box-shadow: var(--shadow-sm);
      backdrop-filter: var(--blur-md);
    }
    .settings-section h4, .account-card h4, .sync-card h4, .auth-card h4 {
      margin: 0 0 10px; font-size: 12px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.05em;
    }
    .settings-section p, .account-card p, .sync-card p { margin: 8px 0; font-size: 13px; color: var(--text-muted); }
    .settings-section strong, .account-card strong, .sync-card strong { color: var(--text); }

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged,
      getRedirectResult,
      GoogleAuthProvider,
      signInWithPopup,
      signInWithRedirect,
      setPersistence,
      browserLocalPersistence,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      getDoc,
      getDocs,
      collection,
      deleteDoc,
      serverTimestamp,
      query,
      where
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
    import {
      getStorage,
      ref as storageRef,
      uploadBytes,
      getDownloadURL
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCAh_YgvwxgUyCC_auTZXs6KycA8QM6Knc",
      authDomain: "launcher-vibe.firebaseapp.com",
      projectId: "launcher-vibe",
      storageBucket: "launcher-vibe.firebasestorage.app",
      messagingSenderId: "429799261697",
      appId: "1:429799261697:web:ac414361432484cf896200",
      measurementId: "G-W2S8C90Q1B"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    try { getAnalytics(firebaseApp); } catch (_) {}
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);
    const storage = getStorage(firebaseApp);
    const googleProvider = new GoogleAuthProvider();
    googleProvider.setCustomParameters({ prompt: 'select_account' });

    const STORAGE_KEY = 'launcherVibeLocalState.v3';
    const PROFILE_KEY = 'launcherVibeProfile.v1';

    const isInvalidLocalOrigin = () => {
      const proto = String(window.location.protocol || '');
      const origin = String(window.location.origin || '');
      return proto === 'file:' || proto === 'content:' || origin === 'null';
    };

    const authUseHint = () => {
      return isInvalidLocalOrigin()
        ? 'Google 로그인은 배포된 https 주소에서만 안정적으로 동작합니다.'
        : '';
    };

    const CURRENT_VERSION = '1.0';

    const state = {
      currentView: 'home',
      editingAppId: null,
      isSignupMode: false,
      currentUser: null,
      apps: [],
      vibeApps: [],
      favorites: [],
      recent: [],
      userProfile: {
        displayName: '게스트',
        statusMessage: '',
        photoURL: null
      }
    };

    // BGM 관리
    const bgmAudio = document.getElementById('bgmAudio');
    const enableBGM = () => {
      if (bgmAudio && bgmAudio.muted) {
        bgmAudio.muted = false;
        bgmAudio.play().catch(() => {});
      }
    };

    // 프로필 저장/로드 함수
    const saveProfileLocally = () => {
      localStorage.setItem(PROFILE_KEY, JSON.stringify(state.userProfile));
    };

    const loadProfileLocally = () => {
      try {
        const saved = localStorage.getItem(PROFILE_KEY);
        if (saved) {
          state.userProfile = JSON.parse(saved);
        }
      } catch (e) {
        console.log('프로필 로드 실패', e);
      }
    };

    const saveUserProfileToFirebase = async (user) => {
      if (!user) return;
      try {
        await setDoc(doc(db, 'users', user.uid), {
          displayName: state.userProfile.displayName,
          statusMessage: state.userProfile.statusMessage,
          photoURL: state.userProfile.photoURL,
          email: user.email,
          lastUpdated: serverTimestamp()
        }, { merge: true });
        saveProfileLocally();
      } catch (e) {
        console.error('프로필 저장 실패:', e);
      }
    };

    const loadUserProfileFromFirebase = async (user) => {
      if (!user) {
        loadProfileLocally();
        return;
      }
      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists()) {
          const data = userDoc.data();
          state.userProfile.displayName = data.displayName || '게스트';
          state.userProfile.statusMessage = data.statusMessage || '';
          state.userProfile.photoURL = data.photoURL || null;
        } else {
          loadProfileLocally();
        }
      } catch (e) {
        console.log('클라우드 프로필 로드 실패, 로컬 사용:', e);
        loadProfileLocally();
      }
    };

    // UI 업데이트
    const updateProfileChip = () => {
      const chip = document.getElementById('profileChip');
      const avatar = document.getElementById('profileChipAvatar');
      const name = document.getElementById('profileChipName');

      if (state.currentUser) {
        avatar.style.display = 'none';
        if (state.userProfile.photoURL) {
          const img = document.createElement('img');
          img.src = state.userProfile.photoURL;
          avatar.replaceWith(img);
          img.id = 'profileChipAvatar';
        } else {
          avatar.textContent = state.userProfile.displayName.charAt(0).toUpperCase() || '👤';
          avatar.style.display = 'inline-flex';
        }
        name.textContent = state.userProfile.displayName || state.currentUser.email;
      } else {
        avatar.textContent = '👤';
        avatar.style.display = 'inline-flex';
        name.textContent = '로그인';
      }
    };

    const updateAuthState = async (user) => {
      state.currentUser = user;
      if (user) {
        await loadUserProfileFromFirebase(user);
        document.getElementById('authStateLabel').textContent = '로그인됨';
        document.getElementById('openProfileFromSettings').style.display = 'inline-block';
      } else {
        state.userProfile = { displayName: '게스트', statusMessage: '', photoURL: null };
        document.getElementById('authStateLabel').textContent = '로그아웃';
        document.getElementById('openProfileFromSettings').style.display = 'none';
      }
      updateProfileChip();
      renderApps();
    };

    // 로그인/회원가입
    const handleAuthSubmit = async () => {
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;
      const errorMsg = document.getElementById('authErrorMsg');

      errorMsg.classList.remove('show');
      errorMsg.textContent = '';

      if (!email || !password) {
        errorMsg.textContent = '이메일과 비밀번호를 입력해주세요.';
        errorMsg.classList.add('show');
        return;
      }

      if (state.isSignupMode) {
        const confirmPassword = document.getElementById('authPasswordConfirm').value;
        if (password !== confirmPassword) {
          errorMsg.textContent = '비밀번호가 일치하지 않습니다.';
          errorMsg.classList.add('show');
          return;
        }
        if (password.length < 6) {
          errorMsg.textContent = '비밀번호는 최소 6자 이상이어야 합니다.';
          errorMsg.classList.add('show');
          return;
        }
        try {
          const result = await createUserWithEmailAndPassword(auth, email, password);
          state.userProfile.displayName = email.split('@')[0];
          await saveUserProfileToFirebase(result.user);
          closeAuthModal();
          enableBGM();
        } catch (e) {
          errorMsg.textContent = '회원가입 실패: ' + (e.message || '알 수 없는 오류');
          errorMsg.classList.add('show');
        }
      } else {
        try {
          await signInWithEmailAndPassword(auth, email, password);
          closeAuthModal();
          enableBGM();
        } catch (e) {
          errorMsg.textContent = '로그인 실패: ' + (e.message || '알 수 없는 오류');
          errorMsg.classList.add('show');
        }
      }
    };

    // Google 로그인
    const handleGoogleLogin = async () => {
      try {
        if (isInvalidLocalOrigin()) {
          alert('Google 로그인은 배포된 https 주소에서만 작동합니다.');
          return;
        }
        if (window.location.protocol === 'file:' || window.location.origin === 'null') {
          alert('배포된 주소에서 사용해주세요.');
          return;
        }
        try {
          const result = await signInWithPopup(auth, googleProvider);
          state.userProfile.displayName = result.user.displayName || result.user.email.split('@')[0];
          await saveUserProfileToFirebase(result.user);
          closeAuthModal();
          enableBGM();
        } catch (popupError) {
          if (popupError.code !== 'auth/popup-closed-by-user') {
            console.error(popupError);
          }
        }
      } catch (e) {
        console.error('Google 로그인 오류:', e);
      }
    };

    // 모달 제어
    const openAuthModal = () => {
      document.getElementById('authModal').classList.add('open');
      enableBGM();
    };

    const closeAuthModal = () => {
      document.getElementById('authModal').classList.remove('open');
      document.getElementById('authEmail').value = '';
      document.getElementById('authPassword').value = '';
      document.getElementById('authPasswordConfirm').value = '';
      document.getElementById('authErrorMsg').textContent = '';
      document.getElementById('authErrorMsg').classList.remove('show');
    };

    const openProfileModal = async () => {
      await loadUserProfileFromFirebase(state.currentUser);
      document.getElementById('displayNameInput').value = state.userProfile.displayName;
      document.getElementById('statusMessageInput').value = state.userProfile.statusMessage;
      document.getElementById('profileEmailText').textContent = state.currentUser?.email || '-';
      document.getElementById('profileUidText').textContent = state.currentUser?.uid || '-';
      document.getElementById('syncStateText').textContent = state.currentUser ? '클라우드' : '로컬';
      document.getElementById('profileModal').classList.add('open');
    };

    const closeProfileModal = () => {
      document.getElementById('profileModal').classList.remove('open');
    };

    // 프로필 저장
    const saveProfile = async () => {
      const displayName = document.getElementById('displayNameInput').value.trim();
      const statusMessage = document.getElementById('statusMessageInput').value.trim();

      if (!displayName) {
        alert('이름을 입력해주세요.');
        return;
      }

      state.userProfile.displayName = displayName;
      state.userProfile.statusMessage = statusMessage;

      if (state.currentUser) {
        await saveUserProfileToFirebase(state.currentUser);
      } else {
        saveProfileLocally();
      }

      updateProfileChip();
      renderApps();
      closeProfileModal();
    };

    // 로그아웃
    const handleLogout = async () => {
      if (confirm('로그아웃하시겠습니까?')) {
        await signOut(auth);
        closeProfileModal();
      }
    };

    // 앱 렌더링
    const renderApps = (searchQuery = '') => {
      const appsGrid = document.getElementById('appsGrid');
      const query = searchQuery.toLowerCase();
      const filtered = state.apps.filter(app =>
        app.name.toLowerCase().includes(query) ||
        app.desc.toLowerCase().includes(query)
      );

      appsGrid.innerHTML = '';
      if (filtered.length === 0) {
        appsGrid.innerHTML = `
          <div class="empty-state">
            <span class="empty-badge">📭</span>
            <h4>앱이 없습니다</h4>
            <p>새 앱을 추가하여 시작하세요</p>
          </div>
        `;
        return;
      }

      filtered.forEach(app => {
        const card = createAppCard(app, false);
        appsGrid.appendChild(card);
      });
    };

    const renderVibeApps = (searchQuery = '') => {
      const vibeAppsGrid = document.getElementById('vibeAppsGrid');
      const query = searchQuery.toLowerCase();
      const filtered = state.vibeApps.filter(app =>
        app.name.toLowerCase().includes(query) ||
        app.desc.toLowerCase().includes(query)
      );

      vibeAppsGrid.innerHTML = '';
      if (filtered.length === 0) {
        vibeAppsGrid.innerHTML = `
          <div class="empty-state">
            <span class="empty-badge">📭</span>
            <h4>앱이 없습니다</h4>
            <p>새 앱을 추가하여 시작하세요</p>
          </div>
        `;
        return;
      }

      filtered.forEach(app => {
        const card = createAppCard(app, true);
        vibeAppsGrid.appendChild(card);
      });
    };

    const createAppCard = (app, isVibeApp) => {
      const card = document.createElement('div');
      card.className = 'app-card';
      card.innerHTML = `
        <div class="app-card-menu">
          <button class="app-card-btn favorite ${app.favorite ? 'active' : ''}" title="즐겨찾기">⭐</button>
          <button class="app-card-btn" title="실행" style="cursor: pointer;">▶️</button>
          <button class="app-card-btn delete" title="삭제">🗑️</button>
        </div>
        <div class="app-card-icon">
          ${app.icon ? `<img src="${app.icon}" alt="${app.name}">` : '📦'}
        </div>
        <div class="app-card-content">
          <div class="app-card-name">${app.name}</div>
          <div class="app-card-desc">${app.desc}</div>
          ${app.date ? `<div class="app-card-date">${app.date}</div>` : ''}
        </div>
      `;

      const favBtn = card.querySelector('.favorite');
      const runBtn = card.querySelector('button:nth-child(2)');
      const delBtn = card.querySelector('.delete');

      favBtn.addEventListener('click', () => {
        app.favorite = !app.favorite;
        favBtn.classList.toggle('active');
        saveState();
        updateShortcuts();
      });

      runBtn.addEventListener('click', () => {
        if (app.html) {
          runApp(app);
        }
      });

      delBtn.addEventListener('click', () => {
        if (confirm(`"${app.name}"을(를) 삭제하시겠습니까?`)) {
          if (isVibeApp) {
            state.vibeApps = state.vibeApps.filter(a => a.id !== app.id);
            renderVibeApps();
          } else {
            state.apps = state.apps.filter(a => a.id !== app.id);
            renderApps();
          }
          saveState();
          updateSettings();
        }
      });

      return card;
    };

    const runApp = (app) => {
      if (!app.html) {
        alert('실행 가능한 HTML 파일이 없습니다.');
        return;
      }

      document.getElementById('runtimeTitle').textContent = app.name;
      const frame = document.getElementById('runtimeFrame');

      // 파일 내용을 Blob으로 변환하여 Data URL 생성
      const blob = new Blob([app.html], { type: 'text/html; charset=utf-8' });
      const dataUrl = URL.createObjectURL(blob);
      frame.src = dataUrl;

      switchView('runtime');

      // 최근 실행 기록 추가
      state.recent = state.recent.filter(id => id !== app.id);
      state.recent.unshift(app.id);
      state.recent = state.recent.slice(0, 5);
      saveState();
      updateShortcuts();
    };

    // 상태 저장/로드
    const saveState = () => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        apps: state.apps,
        vibeApps: state.vibeApps,
        favorites: state.favorites,
        recent: state.recent
      }));
    };

    const loadState = () => {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const data = JSON.parse(saved);
          state.apps = data.apps || [];
          state.vibeApps = data.vibeApps || [];
          state.favorites = data.favorites || [];
          state.recent = data.recent || [];
        }
      } catch (e) {
        console.log('상태 로드 실패', e);
      }
    };

    // 앱 추가/편집 모달
    const openAppModal = (isVibeApp = false) => {
      state.editingAppId = null;
      document.getElementById('modalTitle').textContent = '새 앱 추가';
      document.getElementById('dateFormGroup').style.display = isVibeApp ? 'none' : 'block';
      document.getElementById('nameInput').value = '';
      document.getElementById('descInput').value = '';
      document.getElementById('dateInput').value = '';
      clearFileInputs();
      document.getElementById('modalBackdrop').classList.add('open');
      document.getElementById('modalBackdrop').dataset.isVibeApp = isVibeApp;
    };

    const closeAppModal = () => {
      document.getElementById('modalBackdrop').classList.remove('open');
      document.getElementById('errorMsg').textContent = '';
      document.getElementById('errorMsg').classList.remove('show');
    };

    const clearFileInputs = () => {
      document.getElementById('iconInput').value = '';
      document.getElementById('htmlInput').value = '';
      document.getElementById('iconPreview').classList.remove('show');
      document.getElementById('htmlPreview').classList.remove('show');
    };

    const saveApp = async () => {
      const name = document.getElementById('nameInput').value.trim();
      const desc = document.getElementById('descInput').value.trim();
      const date = document.getElementById('dateInput').value;
      const iconInput = document.getElementById('iconInput');
      const htmlInput = document.getElementById('htmlInput');
      const errorMsg = document.getElementById('errorMsg');

      errorMsg.classList.remove('show');
      errorMsg.textContent = '';

      if (!name) {
        errorMsg.textContent = '앱 이름을 입력해주세요.';
        errorMsg.classList.add('show');
        return;
      }

      if (!htmlInput.files.length) {
        errorMsg.textContent = 'HTML 파일을 선택해주세요.';
        errorMsg.classList.add('show');
        return;
      }

      const app = {
        id: state.editingAppId || Date.now().toString(),
        name,
        desc,
        date: date || '',
        icon: null,
        html: null
      };

      // Icon 읽기
      if (iconInput.files.length) {
        const iconFile = iconInput.files[0];
        app.icon = await new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result);
          reader.readAsDataURL(iconFile);
        });
      }

      // HTML 읽기
      if (htmlInput.files.length) {
        const htmlFile = htmlInput.files[0];
        app.html = await new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result);
          reader.readAsText(htmlFile);
        });
      }

      const isVibeApp = document.getElementById('modalBackdrop').dataset.isVibeApp === 'true';
      if (isVibeApp) {
        const existing = state.vibeApps.findIndex(a => a.id === app.id);
        if (existing >= 0) {
          state.vibeApps[existing] = app;
        } else {
          state.vibeApps.push(app);
        }
        renderVibeApps();
      } else {
        const existing = state.apps.findIndex(a => a.id === app.id);
        if (existing >= 0) {
          state.apps[existing] = app;
        } else {
          state.apps.push(app);
        }
        renderApps();
      }

      saveState();
      updateSettings();
      closeAppModal();
    };

    // 파일 입력 처리
    document.getElementById('iconInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = event => {
          document.getElementById('iconPreviewImg').innerHTML = `<img src="${event.target.result}">`;
          document.getElementById('iconPreviewName').textContent = file.name;
          document.getElementById('iconPreview').classList.add('show');
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('htmlInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('htmlPreviewName').textContent = file.name;
        document.getElementById('htmlPreview').classList.add('show');
      }
    });

    document.getElementById('photoFileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = event => {
          document.getElementById('photoPreviewImg').innerHTML = `<img src="${event.target.result}">`;
          document.getElementById('photoPreviewName').textContent = file.name;
          document.getElementById('photoPreview').classList.add('show');
          state.userProfile.photoURL = event.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('iconRemoveBtn').addEventListener('click', () => {
      document.getElementById('iconInput').value = '';
      document.getElementById('iconPreview').classList.remove('show');
    });

    document.getElementById('htmlRemoveBtn').addEventListener('click', () => {
      document.getElementById('htmlInput').value = '';
      document.getElementById('htmlPreview').classList.remove('show');
    });

    document.getElementById('photoRemoveBtn').addEventListener('click', () => {
      document.getElementById('photoFileInput').value = '';
      document.getElementById('photoPreview').classList.remove('show');
      state.userProfile.photoURL = null;
    });

    // 뷰 전환
    const switchView = (viewName) => {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewName + 'View').classList.add('active');
      state.currentView = viewName;
      enableBGM();
    };

    // 단축 실행 업데이트
    const updateShortcuts = () => {
      const recentList = document.getElementById('recentAppsList');
      const favoriteList = document.getElementById('favoriteAppsList');

      recentList.innerHTML = '';
      favoriteList.innerHTML = '';

      state.recent.forEach(appId => {
        const app = state.apps.find(a => a.id === appId);
        if (app) {
          const btn = document.createElement('button');
          btn.className = 'quick-app-btn recent';
          btn.innerHTML = `
            <div class="quick-app-icon">${app.icon ? `<img src="${app.icon}">` : '📦'}</div>
            <div class="quick-app-content">
              <div class="quick-app-name">${app.name}</div>
              <div class="quick-app-desc">${app.desc}</div>
            </div>
          `;
          btn.addEventListener('click', () => runApp(app));
          recentList.appendChild(btn);
        }
      });

      state.apps.filter(a => a.favorite).forEach(app => {
        const btn = document.createElement('button');
        btn.className = 'quick-app-btn favorite';
        btn.innerHTML = `
          <div class="quick-app-icon">${app.icon ? `<img src="${app.icon}">` : '📦'}</div>
          <div class="quick-app-content">
            <div class="quick-app-name">${app.name}</div>
            <div class="quick-app-desc">${app.desc}</div>
          </div>
        `;
        btn.addEventListener('click', () => runApp(app));
        favoriteList.appendChild(btn);
      });

      if (recentList.children.length === 0) {
        recentList.innerHTML = '<div class="shortcut-empty">최근 앱이 없습니다</div>';
      }
      if (favoriteList.children.length === 0) {
        favoriteList.innerHTML = '<div class="shortcut-empty">즐겨찾기가 없습니다</div>';
      }
    };

    // 설정 업데이트
    const updateSettings = () => {
      document.getElementById('appTotal').textContent = state.apps.length;
      document.getElementById('runtimeCount').textContent = state.vibeApps.length;
    };

    // 이벤트 리스너
    document.getElementById('settingsBtn').addEventListener('click', () => {
      updateSettings();
      document.getElementById('settingsModal').classList.add('open');
    });

    document.getElementById('closeSettings').addEventListener('click', () => {
      document.getElementById('settingsModal').classList.remove('open');
    });

    document.getElementById('profileChip').addEventListener('click', () => {
      if (state.currentUser) {
        openProfileModal();
      } else {
        openAuthModal();
      }
    });

    document.getElementById('openAuthFromSettings').addEventListener('click', () => {
      document.getElementById('settingsModal').classList.remove('open');
      openAuthModal();
    });

    document.getElementById('openProfileFromSettings').addEventListener('click', () => {
      if (state.currentUser) {
        document.getElementById('settingsModal').classList.remove('open');
        openProfileModal();
      }
    });

    document.getElementById('toLibraryBtn').addEventListener('click', () => {
      switchView('library');
    });

    document.getElementById('toVibeLibraryBtn').addEventListener('click', () => {
      switchView('vibe-library');
      renderVibeApps();
    });

    document.getElementById('libraryBackBtn').addEventListener('click', () => {
      switchView('home');
    });

    document.getElementById('vibeBackBtn').addEventListener('click', () => {
      switchView('home');
    });

    document.getElementById('libraryAddBtn').addEventListener('click', () => {
      openAppModal(false);
    });

    document.getElementById('vibeAddBtn').addEventListener('click', () => {
      openAppModal(true);
    });

    document.getElementById('runtimeCloseBtn').addEventListener('click', () => {
      switchView('home');
    });

    document.getElementById('librarySearchInput').addEventListener('input', (e) => {
      renderApps(e.target.value);
    });

    document.getElementById('vibeSearchInput').addEventListener('input', (e) => {
      renderVibeApps(e.target.value);
    });

    document.getElementById('closeAuth').addEventListener('click', closeAuthModal);
    document.getElementById('closeProfile').addEventListener('click', closeProfileModal);
    document.getElementById('closeModalBtn').addEventListener('click', closeAppModal);
    document.getElementById('cancelBtn').addEventListener('click', closeAppModal);

    document.getElementById('loginTabBtn').addEventListener('click', () => {
      state.isSignupMode = false;
      document.getElementById('loginTabBtn').classList.add('active');
      document.getElementById('signupTabBtn').classList.remove('active');
      document.getElementById('signupOnly').style.display = 'none';
      document.getElementById('authSubmitBtn').textContent = '로그인';
    });

    document.getElementById('signupTabBtn').addEventListener('click', () => {
      state.isSignupMode = true;
      document.getElementById('signupTabBtn').classList.add('active');
      document.getElementById('loginTabBtn').classList.remove('active');
      document.getElementById('signupOnly').style.display = 'block';
      document.getElementById('authSubmitBtn').textContent = '회원가입';
    });

    document.getElementById('authSubmitBtn').addEventListener('click', handleAuthSubmit);
    document.getElementById('googleLoginBtn').addEventListener('click', handleGoogleLogin);
    document.getElementById('saveProfileBtn').addEventListener('click', saveProfile);
    document.getElementById('logoutBtn').addEventListener('click', handleLogout);
    document.getElementById('saveBtn').addEventListener('click', saveApp);

    document.getElementById('exportData').addEventListener('click', () => {
      const data = {
        version: CURRENT_VERSION,
        apps: state.apps,
        vibeApps: state.vibeApps,
        exportDate: new Date().toISOString()
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `vibe-launcher-backup-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById('importData').addEventListener('click', () => {
      document.getElementById('importFile').click();
    });

    document.getElementById('importFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = event => {
        try {
          const data = JSON.parse(event.target.result);
          state.apps = data.apps || [];
          state.vibeApps = data.vibeApps || [];
          saveState();
          renderApps();
          renderVibeApps();
          updateSettings();
          alert('데이터를 성공적으로 가져왔습니다.');
        } catch (e) {
          alert('파일을 읽을 수 없습니다.');
        }
      };
      reader.readAsText(file);
    });

    document.getElementById('clearData').addEventListener('click', () => {
      if (confirm('모든 데이터를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) {
        state.apps = [];
        state.vibeApps = [];
        state.favorites = [];
        state.recent = [];
        saveState();
        renderApps();
        renderVibeApps();
        updateSettings();
        updateShortcuts();
        alert('모든 데이터가 삭제되었습니다.');
      }
    });

    // Auth 상태 변경 감시
    onAuthStateChanged(auth, async (user) => {
      await updateAuthState(user);
      if (user) {
        try {
          await setPersistence(auth, browserLocalPersistence);
        } catch (e) {
          console.log('Persistence 설정 실패:', e);
        }
      }
    });

    // 초기 로드
    loadState();
    loadProfileLocally();
    updateProfileChip();
    renderApps();
    renderVibeApps();
    updateShortcuts();
    updateSettings();
    enableBGM();
  </script>
</body>
</html>
